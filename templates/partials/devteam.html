<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
    {% for member in members %}
    <div class="card instruction-box" style="flex: 1 1 400px; border-left: 4px solid {{ member[8] }};">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 15px;">
            <img src="{{ member[5] }}" 
                 alt="{{ member[1] }}" 
                 style="width: 70px; height: 70px; border-radius: 50%; border: 4px solid {{ member[8] }}; object-fit: cover;">

            <div>
                <h3 style="margin: 0; color: {{ member[8] }}; font-family: monospace;">{{ member[1] }}</h3>
                <small style="font-weight: bold; font-family: monospace;">@{{ member[2] }}</small> <br>
                <small class="member-role">{{ member[3] }}</small>
            </div>
        </div>

        <p style="font-size: 0.95rem; line-height: 1.6;">
            {{ member[4] }}
        </p>

        <div class="link-group">
            {% if member[6] %}
            <a target="_blank" href="{{ member[6] }}" class="project-btn">
                <span>📂</span> GitHub Profile
            </a>
            {% endif %}
            
            {% if member[7] %}
            <a target="_blank" href="{{ member[7] }}" class="project-btn secondary">
                <span>🔗</span> Facebook
            </a>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
