<!DOCTYPE html>
<html>
<head>
    <title>Web Terminal</title>

    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            margin: 0;
            padding: 0;
        }

        #terminal {
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
        }

        #input-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #cmd {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #c9d1d9;
            font-family: monospace;
            font-size: 16px;
        }

        .prompt {
            color: #58a6ff;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script src="{{ url_for('terminal.static', filename='terminal.js') }}"></script>

</body>
</html>
